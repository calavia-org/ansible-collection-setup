---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
platforms:
  - name: test
    image: python:slim
    pre_build_image: true
driver:
  name: docker
provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: collections:~/.ansible/collections
    ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "true"
  config_options:
    defaults:
      callbacks_enabled: ansible.posix.profile_tasks
  inventory:
    group_vars:
      all: {}
verifier:
  name: ansible
  env:
    FOO: bar
